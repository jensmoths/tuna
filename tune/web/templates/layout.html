<!doctype html>
<html><head><meta charset="utf-8"><title>Tuna Operator Console</title>
<style>
body{font-family:system-ui,sans-serif;color:#000;background:#fff;max-width:1000px;margin:2rem auto;padding:0 1rem;line-height:1.4}a{color:#000}nav{border-bottom:1px solid #000;padding-bottom:.5rem;margin-bottom:1.5rem}nav a{margin-right:1rem}.card{border:1px solid #000;padding:1rem;margin:1rem 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem}.muted{color:#555}table{border-collapse:collapse;width:100%}td,th{border:1px solid #000;padding:.4rem;text-align:left;vertical-align:top}pre{white-space:pre-wrap;border:1px solid #000;padding:.75rem;overflow:auto}button{background:#fff;color:#000;border:1px solid #000;padding:.5rem .8rem;cursor:pointer}textarea{width:100%;min-height:5rem}.danger{border-width:2px}.status{font-weight:bold}</style>
</head><body>
<nav><strong>Tuna Operator Console</strong> <a href="/">Dashboard</a><a href="/tasks">Tasks</a><a href="/updates">Tune Updates</a><a href="/logs">Blackbox Logs</a></nav>
{% block body %}{% endblock %}
</body></html>
